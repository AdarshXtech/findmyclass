services:
  - type: web
    name: findmyclass
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci
    startCommand: npm run start:production
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: JWT_SECRET
        generateValue: true
