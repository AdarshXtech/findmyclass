services:
  - type: web
    name: findmyclass
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /tmp/findmyclass/database.sqlite
      - key: JWT_SECRET
        generateValue: true
